<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA PLATINUM v14.0 - LEGENDARY EDITION</title>
    <style>
        :root { --bg: #0a0a0c; --card: #121215; --neon: #00ff87; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; --danger: #ff4444; --blue: #00d4ff; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1200px; }
        header { text-align: center; padding: 20px; border-bottom: 1px solid #222; cursor: pointer; }
        h1 span { color: var(--neon); text-shadow: 0 0 10px rgba(0,255,135,0.5); }
        #admin { display: none; background: #1a1a1e; padding: 20px; border: 1px solid var(--neon); border-radius: 12px; margin: 20px 0; border-left: 5px solid var(--neon); }
        .btn { padding: 10px 15px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 10px; margin: 2px; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-green { background: var(--neon); color: #000; }
        .tabs { display: flex; gap: 8px; justify-content: center; margin: 25px 0; flex-wrap: wrap; }
        .tab-btn { background: #222; color: #fff; padding: 10px 20px; border-radius: 30px; border: 1px solid #333; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        .table-wrapper { background: var(--card); border-radius: 12px; overflow-x: auto; border: 1px solid #222; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 900px; }
        th { background: #1c1c21; color: #888; padding: 15px; font-size: 10px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #1c1c21; text-align: center; }
        .player-info { display: flex; align-items: center; gap: 10px; text-align: left; }
        .club-img { width: 35px; height: 35px; object-fit: contain; border-radius: 50%; background: #000; border: 1px solid #333; }
        .gallery-grid { display: none; flex-direction: column; gap: 30px; width: 100%; }
        .record-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .mini-card { background: #1a1a1e; border-left: 4px solid var(--neon); padding: 15px; border-radius: 8px; }
        .mini-card span { font-size: 10px; color: #666; display: block; text-transform: uppercase; }
        .mini-card b { color: #fff; font-size: 18px; display: block; margin-top: 5px; }
        .season-block { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid #333; }
        .podium-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
        .dash-card { background: #1c1c21; border-radius: 12px; padding: 20px; text-align: center; border-bottom: 4px solid #333; position: relative; }
        .dash-card img { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; border: 2px solid #222; }
        .goat-glow { animation: glow 2s infinite alternate; border: 1px solid var(--gold); }
        @keyframes glow { from { box-shadow: 0 0 5px var(--gold); } to { box-shadow: 0 0 20px var(--gold); } }
        .row-edit { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; background: #25252b; padding: 10px; border-radius: 8px; }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <header onclick="openAdmin()">
        <h1>FIFA <span>PLATINUM LEGENDARY</span></h1>
        <p style="color:#555; font-size: 10px;">PANTEÃO DE CAMPEÕES • RECORDES HISTÓRICOS • v14.0</p>
    </header>

    <div id="admin">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button class="btn btn-blue" onclick="exportData()">Backup</button>
            <button class="btn btn-blue" onclick="importData()">Importar</button>
        </div>
        <div id="editor-atual"></div>
        <button class="btn btn-green" onclick="addNewPlayer()">+ Adicionar Técnico</button>
        <button class="btn btn-green" onclick="saveAll()" style="width:100%; margin-top:20px; height:45px;">SALVAR DADOS</button>
        <button class="btn" onclick="closeSeason()" style="background:#400; color:#f66; width:100%; margin-top:10px">ENCERRAR TEMPORADA</button>
    </div>

    <div class="tabs">
        <button id="t-tab" class="tab-btn active" onclick="switchTab('tabela')">TEMPORADA</button>
        <button id="r-tab" class="tab-btn" onclick="switchTab('ranking')">RANKING GERAL</button>
        <button id="g-tab" class="tab-btn" onclick="switchTab('galeria')">HALL DA FAMA</button>
    </div>

    <div id="view-tabela">
        <select id="season-selector" onchange="changeView(this.value)" style="width:100%; padding:12px; background:#111; color:var(--neon); border:1px solid #333; border-radius:8px; margin-bottom:15px;"></select>
        <div class="table-wrapper"><table id="table-main"></table></div>
    </div>

    <div id="view-ranking" style="display:none">
        <div class="table-wrapper"><table id="table-ranking"></table></div>
    </div>

    <div id="view-galeria" class="gallery-grid"></div>
</div>

<script>
    const STORAGE_KEY = 'fifa_legendary_v14';
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { atual: [], historico: [] };
    let currentMode = 'atual';

    function openAdmin() { if(prompt("Senha:") === '123') document.getElementById('admin').style.display='block'; }

    function switchTab(mode) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('view-tabela').style.display = mode === 'tabela' ? 'block' : 'none';
        document.getElementById('view-ranking').style.display = mode === 'ranking' ? 'block' : 'none';
        document.getElementById('view-galeria').style.display = mode === 'galeria' ? 'flex' : 'none';
        if(mode === 'tabela') { document.getElementById('t-tab').classList.add('active'); renderTable(); }
        if(mode === 'ranking') { document.getElementById('r-tab').classList.add('active'); renderRankingGeral(); }
        if(mode === 'galeria') { document.getElementById('g-tab').classList.add('active'); renderGallery(); }
    }

    function calcBaseForca(gp, gc) { return (gp * 3.5) - (gc * 2.5); }

    function renderTable() {
        const selector = document.getElementById('season-selector');
        selector.innerHTML = '<option value="atual">Temporada Ativa</option>';
        db.historico.forEach((h, i) => selector.innerHTML += `<option value="${i}">${h.nome}</option>`);

        let list = currentMode === 'atual' ? [...db.atual] : [...db.historico[currentMode].dados];
        list.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));

        const table = document.getElementById('table-main');
        table.innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">TÉCNICO</th><th>PTS</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GS</th><th>SG</th><th>%</th><th>FORÇA</th></tr></thead>
        <tbody>${list.map((j, i) => {
            const pts = (j.v*3)+j.e; 
            const jgs = (j.v||0) + (j.e||0) + (j.d||0);
            const apr = jgs > 0 ? ((pts/(jgs*3))*100).toFixed(1) : 0;
            let fb = calcBaseForca(j.gp, j.gc);
            let bn = (i===0)?20 : (i===1)?10 : (i===2)?5 : (i===list.length-1 && list.length>3)?-5 : 0;
            return `<tr><td>${i+1}º</td><td class="player-info"><img src="${j.foto||''}" class="club-img"><b>${j.tecnico}</b></td><td>${pts}</td><td>${j.v}</td><td>${j.e}</td><td>${j.d}</td><td>${j.gp}</td><td>${j.gc}</td><td>${j.gp-j.gc}</td><td>${apr}%</td><td style="color:var(--gold); font-weight:bold">${(fb+bn).toFixed(1)}</td></tr>`;
        }).join('')}</tbody>`;
        renderEditor();
    }

    function renderRankingGeral() {
        let stats = {};
        const process = (lista) => {
            lista.forEach((j, i) => {
                if(!stats[j.tecnico]) stats[j.tecnico] = { t:j.tecnico, p:0, j:0, v:0, e:0, d:0, gp:0, gc:0, pts:0, f:0 };
                let s = stats[j.tecnico]; s.p++;
                s.j += (j.v+j.e+j.d); s.v += j.v; s.e += j.e; s.d += j.d;
                s.gp += j.gp; s.gc += j.gc; s.pts += ((j.v*3)+j.e);
                let bn = (i===0)?20:(i===1)?10:(i===2)?5:(i===lista.length-1 && lista.length>3)?-5:0;
                s.f += (calcBaseForca(j.gp, j.gc) + bn);
            });
        };
        db.historico.forEach(h => process(h.dados));
        process(db.atual);
        let sorted = Object.values(stats).sort((a,b) => b.pts - a.pts);

        document.getElementById('table-ranking').innerHTML = `<thead><tr><th>POS</th><th style="text-align:left">TÉCNICO</th><th>PART</th><th>V</th><th>E</th><th>D</th><th>GF</th><th>GS</th><th>SG</th><th>PTS</th><th>FORÇA MÉD</th></tr></thead>
        <tbody>${sorted.map((j, i) => `<tr><td>${i+1}º</td><td style="text-align:left"><b>${j.t}</b></td><td>${j.p}</td><td>${j.v}</td><td>${j.e}</td><td>${j.d}</td><td>${j.gp}</td><td>${j.gc}</td><td>${j.gp-j.gc}</td><td style="color:var(--neon)">${j.pts}</td><td style="color:var(--gold)">${(j.f/j.p).toFixed(1)}</td></tr>`).join('')}</tbody>`;
    }

    function renderGallery() {
        const gal = document.getElementById('view-galeria');
        if(!db.historico.length) { gal.innerHTML = "<p style='text-align:center'>Histórico vazio.</p>"; return; }

        let medalhas = {};
        db.historico.forEach(h => {
            h.dados.forEach((j, pos) => {
                if(!medalhas[j.tecnico]) medalhas[j.tecnico] = { o:0, p:0, b:0, l:0, gf:0, j:0 };
                let m = medalhas[j.tecnico];
                if(pos===0) m.o++; if(pos===1) m.p++; if(pos===2) m.b++;
                if(pos===h.dados.length-1) m.l++;
                m.gf += j.gp; m.j += (j.v+j.e+j.d);
            });
        });

        let art = Object.entries(medalhas).sort((a,b) => b[1].gf - a[1].gf)[0];
        let wall = Object.entries(medalhas).sort((a,b) => (a[1].j > 0 ? a[1].gc/a[1].j : 99) - (b[1].j > 0 ? b[1].gc/b[1].j : 99))[0];

        gal.innerHTML = `
            <div class="record-grid">
                <div class="mini-card"><span>MAIOR ARTILHEIRO</span><b>${art[0]}</b><small>${art[1].gf} GOLOS</small></div>
                <div class="mini-card" style="border-color:var(--blue)"><span>MELHOR DEFESA</span><b>${wall ? wall[0] : '---'}</b><small>MENOS GS/JOGO</small></div>
            </div>
            <div class="table-wrapper">
                <table style="min-width:600px">
                    <thead><tr><th>TÉCNICO</th><th>🥇 OURO</th><th>🥈 PRATA</th><th>🥉 BRONZE</th><th>💩 LANTERNA</th></tr></thead>
                    <tbody>${Object.entries(medalhas).sort((a,b) => b[1].o - a[1].o).map(([n, m]) => `<tr><td><b>${n}</b></td><td style="color:var(--gold)">${m.o}</td><td style="color:var(--silver)">${m.p}</td><td style="color:var(--bronze)">${m.b}</td><td style="color:var(--danger)">${m.l}</td></tr>`).join('')}</tbody>
                </table>
            </div>
        `;

        gal.innerHTML += db.historico.map(h => `
            <div class="season-block" style="margin-top:20px">
                <div style="color:var(--neon); margin-bottom:15px; font-weight:bold">${h.nome}</div>
                <div class="podium-dashboard">
                    <div class="dash-card goat-glow"><img src="${h.dados[0].foto}"><h4>${h.dados[0].tecnico}</h4><small>🥇 CAMPEÃO</small></div>
                    ${h.dados[1]?`<div class="dash-card"><img src="${h.dados[1].foto}"><h4>${h.dados[1].tecnico}</h4><small>🥈 VICE</small></div>`:''}
                    ${h.dados[2]?`<div class="dash-card"><img src="${h.dados[2].foto}"><h4>${h.dados[2].tecnico}</h4><small>🥉 3º LUGAR</small></div>`:''}
                </div>
            </div>`).reverse().join('');
    }

    function renderEditor() {
        document.getElementById('editor-atual').innerHTML = db.atual.map((j, i) => `
        <div class="row-edit">
            <input style="width:90px" type="text" value="${j.tecnico}" onchange="db.atual[${i}].tecnico=this.value">
            <input style="width:120px" type="text" placeholder="URL Foto" value="${j.foto||''}" onchange="db.atual[${i}].foto=this.value">
            V<input type="number" style="width:40px" value="${j.v}" onchange="db.atual[${i}].v=parseInt(this.value)">
            E<input type="number" style="width:40px" value="${j.e}" onchange="db.atual[${i}].e=parseInt(this.value)">
            D<input type="number" style="width:40px" value="${j.d||0}" onchange="db.atual[${i}].d=parseInt(this.value)">
            GP<input type="number" style="width:40px" value="${j.gp}" onchange="db.atual[${i}].gp=parseInt(this.value)">
            GS<input type="number" style="width:40px" value="${j.gc}" onchange="db.atual[${i}].gc=parseInt(this.value)">
            <button onclick="db.atual.splice(${i},1);saveAll()" style="color:red; background:none; border:none;">X</button>
        </div>`).join('');
    }

    function saveAll() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); renderTable(); }
    function addNewPlayer() { db.atual.push({tecnico: "Novo", foto: "", v:0, e:0, d:0, gp:0, gc:0}); renderTable(); }
    function changeView(v) { currentMode = v; renderTable(); }
    function exportData() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([JSON.stringify(db)], {type:'application/json'}));
        a.download = 'fifa_platinum_v14.json'; a.click();
    }
    function importData() {
        const f = document.createElement('input'); f.type = 'file';
        f.onchange = e => {
            const r = new FileReader(); r.readAsText(e.target.files[0]);
            r.onload = ev => { db = JSON.parse(ev.target.result); saveAll(); location.reload(); };
        }; f.click();
    }
    function closeSeason() {
        let n = prompt("Nome da Temporada:");
        if(n && db.atual.length > 0) {
            db.atual.sort((a,b) => ((b.v*3)+b.e) - ((a.v*3)+a.e) || (b.gp-b.gc) - (a.gp-a.gc));
            db.historico.push({ nome: n, dados: JSON.parse(JSON.stringify(db.atual)) });
            db.atual = db.atual.map(j => ({...j, v:0, e:0, d:0, gp:0, gc:0}));
            saveAll();
        }
    }
    renderTable();
</script>
</body>
</html>
